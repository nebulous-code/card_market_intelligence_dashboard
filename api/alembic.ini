# Alembic configuration file.
#
# Alembic is the database migration tool used by this project. It tracks
# changes to the database schema over time and can apply or roll back those
# changes. This file tells Alembic where to find the migration scripts and
# how to format its log output.
#
# The database URL (sqlalchemy.url) is intentionally left blank here.
# It is injected at runtime from the DATABASE_URL environment variable
# in alembic/env.py. This prevents database credentials from ever being
# stored in a config file that could be committed to version control.

[alembic]
# Location of the migration scripts directory relative to this file.
script_location = alembic

# Add the current directory to the Python path when running Alembic commands.
# This allows the migration scripts to import from the api/ package
# (e.g. "from database import Base").
prepend_sys_path = .

# Database URL is set at runtime via environment variable -- do not put
# credentials here.
sqlalchemy.url =

# ---- Logging configuration -----------------------------------------------
# The sections below configure Python's standard logging system for Alembic.
# This controls what gets printed to the console when migrations run.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

# SQLAlchemy query logging. Set to INFO to see all SQL statements being
# executed, which is useful for debugging migration issues.
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# Alembic's own log output. INFO level shows which migrations are being
# applied and whether the database is already up to date.
[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
