# Test suites -- runs on every push and PR.
#
# Two parallel jobs:
#   pytest    -- Python (api/ + ingestion/), 100% branch coverage gated.
#                Uses a Postgres 16 service container so alembic migrations
#                + DB-backed tests run against a real database.
#   vitest    -- frontend (src/utils/ + src/api/), 100% on all four metrics.
#                Components and views are intentionally not measured -- we
#                trust Vuetify and the chart libs.
#
# Both jobs are required checks on PRs to main/dev.

name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  pytest:
    name: pytest + 100% branch coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: card_market_test
        ports:
          - 5433:5432
        # GitHub's services block doesn't accept a `healthcheck` array the
        # same way docker-compose does -- options is the right key here.
        options: >-
          --health-cmd "pg_isready -U test -d card_market_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30

    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5433/card_market_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Run tests
        run: tools/test.sh --no-docker

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: ignore

  vitest:
    name: vitest + 100% coverage on utils & api
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: frontend/coverage/
          if-no-files-found: ignore
