# Nightly price ingestion workflow.
#
# Runs the PokemonPriceTracker ingestion script every night at 2:00 AM US
# Eastern (07:00 UTC). Fetches current card prices for all sets in the
# database and writes them to Neon as price_snapshots rows.
#
# Required GitHub Actions secrets (set in repo Settings > Secrets):
#   DATABASE_URL                    -- Neon connection string
#   POKEMON_PRICE_TRACKER_API_KEY   -- PokemonPriceTracker API key
#
# Optional secrets (defaults to free-tier behaviour if not set):
#   PPT_INCLUDE_HISTORY             -- "true" to request price history (API tier)
#   PPT_HISTORY_DAYS                -- number of history days (default 7)
#   PPT_INCLUDE_EBAY                -- "true" to request eBay graded prices (API tier)
#
# Optional variables (set in repo Settings > Variables, not Secrets):
#   PPT_MAX_CARDS                   -- cap cards fetched per run to reserve daytime credits.
#                                      Unset (or 0) means no cap (full nightly run).
#
# Email notification secrets (set in repo Settings > Secrets):
#   GMAIL_USERNAME      -- Gmail address used to send the summary email
#   GMAIL_APP_PASSWORD  -- Gmail App Password (NOT your regular password).
#                          Generate at myaccount.google.com → Security → App Passwords.
#                          Requires 2-factor authentication to be enabled first.
#   NOTIFY_EMAIL        -- Address to send the summary to (can equal GMAIL_USERNAME)
#
# The workflow can also be triggered manually from the Actions tab using
# workflow_dispatch, which is useful for testing or running a backfill.

name: Nightly Price Ingestion

on:
  schedule:
    # 07:00 UTC = 02:00 AM US Eastern (UTC-5 in winter, UTC-4 in summer).
    - cron: "0 7 * * *"
  workflow_dispatch:  # Allow manual runs from the GitHub Actions UI.

jobs:
  ingest:
    name: Run price ingestion
    runs-on: ubuntu-latest
    # Default values used if the ingestion script crashes before writing to GITHUB_ENV.
    # The script overwrites these on a normal run; they act as a fallback for hard failures.
    env:
      RUN_DATE: unknown
      RUN_STATUS: "❌ Failed (script did not complete)"
      EMAIL_BODY: "The ingestion script crashed before generating a summary. Check the log artifact for details."

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        working-directory: ingestion
        run: uv python install

      - name: Install dependencies
        working-directory: ingestion
        run: uv sync --frozen

      - name: Run ingestion
        working-directory: ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POKEMON_PRICE_TRACKER_API_KEY: ${{ secrets.POKEMON_PRICE_TRACKER_API_KEY }}
          # These default to "false" if the secret is not set, giving free-tier behaviour.
          PPT_INCLUDE_HISTORY: ${{ secrets.PPT_INCLUDE_HISTORY || 'false' }}
          PPT_HISTORY_DAYS: ${{ secrets.PPT_HISTORY_DAYS || '7' }}
          PPT_INCLUDE_EBAY: ${{ secrets.PPT_INCLUDE_EBAY || 'false' }}
          # Cap cards per run to reserve daytime credits for testing.
          # Set this in repo Settings > Variables (not Secrets) to a number like 50.
          # Leave unset or set to 0 for a full uncapped run.
          PPT_MAX_CARDS: ${{ vars.PPT_MAX_CARDS || '0' }}
        run: uv run python run.py

      - name: Upload ingestion log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-log-${{ github.run_id }}
          path: ingestion/ingestion.log
          retention-days: 7

      - name: Send ingestion summary email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[Card Market] Nightly Ingestion — ${{ env.RUN_DATE }} — ${{ env.RUN_STATUS }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Card Market Ingestion <${{ secrets.GMAIL_USERNAME }}>
          body: ${{ env.EMAIL_BODY }}
