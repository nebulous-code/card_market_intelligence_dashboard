services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  ingestion:
    build: ./ingestion
    env_file:
      - .env
    # Does not start automatically. Run on demand:
    #   docker compose run ingestion python run.py --set-id base1

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
